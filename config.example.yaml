database:
  path: data/cinepi_rag.sqlite

retrieval:
  top_k: 6

discord_exports:
  # Raw channel exports are useful for extraction/review, but should still be treated as source material.
  default_project: cinepi
  preserve_author_names: false
  include_bots: false
  max_chars: 5000
  max_messages: 40

llm:
  # Use "offline" until Ollama, vLLM, or a hosted provider is configured.
  #default_provider: offline
  default_provider: Ollama

  providers:
    offline:
      type: offline
      model: none

    ollama:
      type: openai_compatible
      base_url: http://localhost:11434/v1
      api_key: ollama
      model: qwen3:30b-a3b-instruct-2507-q4_K_M

    vllm:
      type: openai_compatible
      base_url: http://localhost:8000/v1
      api_key: local-dev-key
      model: Qwen/Qwen3-30B-A3B-Instruct-2507

    hosted_openai:
      type: openai_compatible
      base_url: https://api.openai.com/v1
      api_key_env: OPENAI_API_KEY
      model: gpt-4.1-mini
